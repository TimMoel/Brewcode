<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrewCode – Brew Guide</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1 id="BrewCodeTitle">
          <a href="index.html" class="site-title">
            BrewC<img src="https://static.thenounproject.com/png/120176-200.png" alt="Coffee Icon" class="icon">de
          </a>
        </h1>
        <span id="Sub-Title">Brew Your Perfect Cup</span>
      </div>
    </header>

    <main>
      <a href="results.html" class="back-link">← Back to results</a>

      <div id="brewGuide">
        <h1 id="beanName"></h1>
        <p id="description"></p>
        <div id="ratingDisplay" class="rating"></div>
        <div id="ratingWidget" class="rating-widget"></div>

        <nav class="method-nav" id="methodNav"></nav>

        <div class="grinder-row">
          <label for="grinder-select">Grinder</label>
          <select id="grinder-select">
            <option value="default">— select —</option>
            <option value="df54">DF54</option>
            <option value="chestnut-c2">Chestnut C2</option>
          </select>
        </div>

        <div id="methodDetails"></div>
      </div>
    </main>

    <script>
      let coffeeData = [];
      let currentMethod = null;

      window.onload = async () => {
        try {
          const response = await fetch("data.json");
          coffeeData = await response.json();

          const selectedBeanName = localStorage.getItem("selectedBean");
          const selectedBean = coffeeData.find((bean) => bean.Bean === selectedBeanName);

          if (!selectedBean) {
            document.getElementById("brewGuide").innerHTML = "<p style='color:#828282;'>Bean not found.</p>";
            return;
          }

          document.getElementById("beanName").textContent = selectedBean.Bean;
          document.getElementById("description").textContent = selectedBean.Description;

          populateMethods(selectedBean.Methods);
          displayMethod(selectedBean.Methods[0]);
          loadRatingData(selectedBean);
          displayAverageRating(selectedBean);
          setupRatingWidget(selectedBean);
        } catch (error) {
          console.error("Error loading coffee data:", error);
        }
      };

      function populateMethods(methods) {
        const nav = document.getElementById("methodNav");
        nav.innerHTML = methods.map((method, index) =>
          `<a data-index="${index}" class="${index === 0 ? "active" : ""}">${method.Method}</a>`
        ).join("");

        nav.addEventListener("click", (e) => {
          const link = e.target.closest("a");
          if (!link) return;
          nav.querySelectorAll("a").forEach((a) => a.classList.remove("active"));
          link.classList.add("active");
          displayMethod(methods[parseInt(link.dataset.index)]);
        });
      }

      function displayMethod(method) {
        currentMethod = method;
        document.getElementById("methodDetails").innerHTML = `
          <table class="method-table">
            <tr><td>Grind Size</td><td><span id="grind-size-value">${method["Grind Size"]}</span></td></tr>
            <tr><td>Ratio</td><td>${method.Ratio}</td></tr>
            <tr><td>Water Temperature</td><td>${method["Water Temperature"]}°C</td></tr>
            <tr><td>Blooming Time</td><td>${method["Blooming Time"]}</td></tr>
            <tr><td>Coffee</td><td>${method["Coffee (g)"]}g</td></tr>
            <tr><td>Water</td><td>${method["Water (ml)"]}ml</td></tr>
            <tr class="instructions-row"><td>Instructions</td><td>${method.Instructions}</td></tr>
          </table>
        `;
        document.getElementById("grinder-select").value = "default";
        updateGrindSize();
      }

      function updateGrindSize() {
        const grindSizeValue = document.getElementById("grind-size-value");
        if (!grindSizeValue || !currentMethod) return;
        const selectedGrinder = document.getElementById("grinder-select").value;
        const settings = {
          df54: currentMethod["Grinder Settings"]?.df54 || "Unavailable",
          "chestnut-c2": currentMethod["Grinder Settings"]?.["chestnut-c2"] || "Unavailable",
        };
        grindSizeValue.textContent = settings[selectedGrinder] || currentMethod["Grind Size"];
      }

      document.getElementById("grinder-select").addEventListener("change", updateGrindSize);

      function renderStars(rating) {
        let stars = "";
        for (let i = 1; i <= 5; i++) stars += i <= Math.round(rating) ? "★" : "☆";
        return stars;
      }

      function displayAverageRating(bean) {
        const rating = bean.AverageRating || 0;
        const count = bean.RatingCount || 0;
        document.getElementById("ratingDisplay").innerHTML =
          `${renderStars(rating)} ${rating.toFixed(1)} &middot; ${count} rating${count !== 1 ? "s" : ""}`;
      }

      function setupRatingWidget(bean) {
        const widget = document.getElementById("ratingWidget");
        widget.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const span = document.createElement("span");
          span.classList.add("star");
          span.innerHTML = "☆";
          span.dataset.value = i;
          span.addEventListener("click", () => handleRating(bean, i));
          widget.appendChild(span);
        }
        const saved = parseInt(localStorage.getItem(`rating_${bean.Bean}`), 10);
        if (saved) highlightWidget(saved);
      }

      function highlightWidget(value) {
        document.querySelectorAll("#ratingWidget .star").forEach((star, idx) => {
          star.innerHTML = idx < value ? "★" : "☆";
        });
      }

      function loadRatingData(bean) {
        const data = localStorage.getItem(`ratingData_${bean.Bean}`);
        if (data) {
          const parsed = JSON.parse(data);
          bean.AverageRating = parsed.average;
          bean.RatingCount = parsed.count;
        }
      }

      function saveRatingData(bean) {
        localStorage.setItem(`ratingData_${bean.Bean}`, JSON.stringify({
          average: bean.AverageRating || 0,
          count: bean.RatingCount || 0,
        }));
      }

      function handleRating(bean, value) {
        const key = `rating_${bean.Bean}`;
        const previous = parseInt(localStorage.getItem(key), 10);
        let avg = bean.AverageRating || 0;
        let count = bean.RatingCount || 0;

        if (previous) {
          avg = (avg * count - previous + value) / count;
        } else {
          avg = (avg * count + value) / (count + 1);
          count += 1;
          bean.RatingCount = count;
        }

        bean.AverageRating = avg;
        bean.RatingCount = count;
        localStorage.setItem(key, value);
        saveRatingData(bean);
        highlightWidget(value);
        displayAverageRating(bean);
      }
    </script>
  </body>
</html>
