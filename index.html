<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrewCode</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1 id="BrewCodeTitle">
          <a href="index.html" class="site-title">
            BrewC<img src="https://static.thenounproject.com/png/120176-200.png" alt="Coffee Icon" class="icon">de
          </a>
        </h1>
        <span id="Sub-Title">Brew Your Perfect Cup</span>
      </div>
    </header>

    <main>
      <div class="search-row">
        <input id="coffeeSearch" type="text" placeholder="Search coffee beans, e.g. Lavazza…" />
        <button id="searchButton">Search</button>
      </div>
      <p id="searchError" class="search-error" hidden>Please enter a coffee bean name.</p>

      <div class="filters">
        <label for="originSelect">Origin</label>
        <select id="originSelect">
          <option value="">All</option>
        </select>
        <label for="roastSelect">Roast</label>
        <select id="roastSelect">
          <option value="">Any</option>
          <option value="light">Light</option>
          <option value="medium">Medium</option>
          <option value="dark">Dark</option>
        </select>
        <div id="tagFilters">
          <span>Tags</span>
          <div id="tagContainer"></div>
        </div>
      </div>
    </main>

    <script>
      let coffeeData = [];

      window.onload = async () => {
        try {
          const response = await fetch("data.json");
          coffeeData = await response.json();
          populateFilters();
        } catch (error) {
          console.error("Error loading coffee data:", error);
        }
      };

      function populateFilters() {
        const originSelect = document.getElementById("originSelect");
        const tagContainer = document.getElementById("tagContainer");
        const origins = [...new Set(coffeeData.map((b) => b.Origin))];
        origins.forEach((origin) => {
          const opt = document.createElement("option");
          opt.value = origin;
          opt.textContent = origin;
          originSelect.appendChild(opt);
        });
        const tags = [...new Set(coffeeData.flatMap((b) => b.Tags))];
        tags.forEach((tag) => {
          const label = document.createElement("label");
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.value = tag;
          label.appendChild(cb);
          label.appendChild(document.createTextNode(tag));
          tagContainer.appendChild(label);
        });
      }

      document.getElementById("searchButton").addEventListener("click", () => {
        const searchQuery = document.getElementById("coffeeSearch").value.trim().toLowerCase();
        const errorEl = document.getElementById("searchError");
        if (!searchQuery) {
          errorEl.hidden = false;
          return;
        }
        errorEl.hidden = true;

        const selectedOrigin = document.getElementById("originSelect").value;
        const selectedRoast = document.getElementById("roastSelect").value;
        const selectedTags = Array.from(
          document.querySelectorAll("#tagContainer input:checked")
        ).map((cb) => cb.value);

        let matchingBeans = coffeeData.filter((bean) =>
          bean.Bean.toLowerCase().includes(searchQuery)
        );
        if (selectedOrigin) matchingBeans = matchingBeans.filter((bean) => bean.Origin === selectedOrigin);
        if (selectedRoast)  matchingBeans = matchingBeans.filter((bean) => bean.Roast === selectedRoast);
        if (selectedTags.length) matchingBeans = matchingBeans.filter((bean) =>
          selectedTags.every((tag) => bean.Tags.includes(tag))
        );

        localStorage.setItem("searchResults", JSON.stringify(matchingBeans));
        localStorage.setItem("searchFilters", JSON.stringify({
          query: searchQuery,
          origin: selectedOrigin,
          roast: selectedRoast,
          tags: selectedTags,
        }));

        window.location.href = "results.html";
      });

      document.getElementById("coffeeSearch").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("searchButton").click();
      });
    </script>
  </body>
</html>
