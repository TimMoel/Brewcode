<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrewCode – Results</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1 id="BrewCodeTitle">
          <a href="index.html" class="site-title">
            BrewC<img src="https://static.thenounproject.com/png/120176-200.png" alt="Coffee Icon" class="icon">de
          </a>
        </h1>
        <span id="Sub-Title">Brew Your Perfect Cup</span>
      </div>
    </header>

    <main>
      <a href="index.html" class="back-link">← Back</a>
      <h2 id="SearchResultsTitle">Search Results</h2>
      <div id="activeFilters"></div>
      <div id="results"></div>
    </main>

    <script>
      const searchResults = JSON.parse(localStorage.getItem("searchResults")) || [];
      const searchFilters = JSON.parse(localStorage.getItem("searchFilters")) || {};

      document.getElementById("activeFilters").innerHTML = formatFilters(searchFilters);

      const resultsDiv = document.getElementById("results");
      if (searchResults.length === 0) {
        resultsDiv.innerHTML = "<p style='padding:16px 0; color:#828282;'>No matching beans found.</p>";
      } else {
        resultsDiv.innerHTML = searchResults.map((bean) => {
          const stored = localStorage.getItem(`ratingData_${bean.Bean}`);
          const data = stored ? JSON.parse(stored) : null;
          const rating = data ? data.average : bean.AverageRating || 0;
          const count = data ? data.count : bean.RatingCount || 0;
          return `
            <div class="result-item" onclick="goToBrewGuide('${bean.Bean}')">
              <h3>${bean.Bean}</h3>
              <p>${bean.Description}</p>
              <p class="rating">${renderStars(rating)} ${rating.toFixed(1)} &middot; ${count} rating${count !== 1 ? "s" : ""}</p>
            </div>
          `;
        }).join("");
      }

      function formatFilters(filters) {
        const parts = [];
        if (filters.query)  parts.push(`"${filters.query}"`);
        if (filters.origin) parts.push(filters.origin);
        if (filters.roast)  parts.push(filters.roast);
        if (filters.tags && filters.tags.length) parts.push(filters.tags.join(", "));
        return parts.length ? `<p>${parts.join(" &middot; ")}</p>` : "";
      }

      function renderStars(rating) {
        let stars = "";
        for (let i = 1; i <= 5; i++) stars += i <= Math.round(rating) ? "★" : "☆";
        return stars;
      }

      function goToBrewGuide(beanName) {
        localStorage.setItem("selectedBean", beanName);
        window.location.href = "brewguide.html";
      }
    </script>
  </body>
</html>
